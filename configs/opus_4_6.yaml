# Claude Opus 4.6 — Full Hyperparameter Configuration
# All values are speculative / estimated based on published literature.

# ============================================================
# MODEL ARCHITECTURE
# ============================================================
model:
  vocab_size: 131072
  hidden_size: 16384
  intermediate_size: 65536         # SwiGLU expert intermediate dim
  num_hidden_layers: 160
  head_dim: 128
  num_attention_heads: 128
  num_key_value_heads: 16          # GQA: 128/16 = 8 groups
  num_experts: 128
  num_experts_per_tok: 2           # top-2 routing
  router_aux_loss_coef: 0.02
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: false
  use_cache: true

  # Position encoding
  max_position_embeddings: 1048576
  rope_theta: 500000.0
  rope_scaling:
    type: yarn
    factor: 8.0
    original_max_position_embeddings: 131072
    attention_factor: 0.1
    beta_fast: 32
    beta_slow: 1

# ============================================================
# TRAINING
# ============================================================
training:
  # Compute budget
  total_tokens: 20_000_000_000_000    # 20T tokens (Chinchilla ~optimal)
  max_steps: 1_000_000

  # Batch size
  # Effective batch = micro_batch × grad_accum × world_size
  # Target: ~4M tokens/step (common for large models)
  micro_batch_size: 1               # per GPU
  grad_accum_steps: 8
  # world_size = 32000 GPUs (set by SLURM/torchrun)
  # effective_batch_tokens = 1 × 8 × 32000 × 4096 = ~1B tokens/step

  # Sequence length
  seq_len: 4096                     # pretraining context
  # Extended to 1M via YaRN in long-context fine-tune phase

  # Precision
  dtype: bfloat16
  grad_dtype: float32               # accumulate gradients in FP32

  # Gradient checkpointing
  gradient_checkpointing: true      # recompute activations → saves ~60% RAM

  # Stability
  grad_clip: 1.0
  loss_z_coef: 1.0e-4

# ============================================================
# OPTIMIZER
# ============================================================
optimizer:
  name: adamw
  lr: 3.0e-4
  lr_min: 3.0e-5                    # 10% of max (cosine end value)
  betas: [0.9, 0.95]
  weight_decay: 0.1
  eps: 1.0e-8
  fused: true                       # fused CUDA kernel (H100 optimized)

  # Learning rate schedule
  scheduler: cosine_with_warmup
  warmup_steps: 2000
  cooldown_steps: 10000             # linear decay to lr_min at end

# ============================================================
# DISTRIBUTED TRAINING
# ============================================================
distributed:
  strategy: fsdp                    # Fully Sharded Data Parallel
  fsdp_sharding_strategy: FULL_SHARD
  # Shard both model params and optimizer state across all ranks

  # Mixed precision
  fsdp_mixed_precision: true
  compute_dtype: bfloat16
  param_dtype: bfloat16
  buffer_dtype: float32

  # Activation checkpointing policy
  # Only checkpoint MoE expert layers (largest activations)
  activation_checkpointing_policy: moe_experts

  # Communication
  # NVLink within node (600 GB/s), InfiniBand across nodes
  backend: nccl
  timeout_minutes: 30

# ============================================================
# HARDWARE
# ============================================================
hardware:
  gpus_per_node: 8                  # 8× H100 SXM5 per node
  num_nodes: 4000                   # = 32,000 GPUs total
  gpu_memory_gb: 80
  interconnect:
    intra_node: nvlink_5            # 900 GB/s bidirectional
    inter_node: infiniband_hdr400   # 400 Gb/s per port

  # Memory math (per GPU):
  # Model weights (BF16): 4TB / 32000 = 125 MB
  # Optimizer (FP32):     8TB / 32000 = 250 MB
  # Activations:          ~20-30 GB (before checkpointing)
  # KV cache (training):  ~500 MB (short seq, small batch)
  # Total needed:         ~35-40 GB → fits in 80 GB ✓

# ============================================================
# INFERENCE / FAST MODE
# ============================================================
inference:
  # Speculative decoding (EAGLE-2)
  speculative_decoding: true
  draft_model_params: 1_000_000_000    # 1B param draft model
  spec_lookahead: 5                    # tokens drafted ahead
  spec_acceptance_rate: 0.87           # expected acceptance rate
  spec_speedup: 5.5                    # expected tokens/pass

  # Thinking mode budgets (tokens)
  thinking_budgets:
    fast:   {min: 0,     max: 0}
    low:    {min: 0,     max: 200}
    medium: {min: 500,   max: 5000}
    high:   {min: 2000,  max: 30000}
    max:    {min: 10000, max: 128000}

  # Entropy thresholds for early stopping
  thinking_entropy_thresholds:
    low:    0.50
    medium: 0.30
    high:   0.15
    max:    0.05

  # Compaction
  thinking_compaction_threshold: 30000   # tokens before summarization
  thinking_compaction_target:    2000    # target summary length

  # KV cache
  kv_cache_dtype: bfloat16
  prefix_cache_ttl_seconds: 300          # 5 minutes
  prefix_cache_min_tokens: 1024          # minimum cacheable prefix

  # Latency targets (milliseconds)
  latency_targets:
    ttft_fast_ms:   500                  # time to first token (fast mode)
    ttft_max_ms:  60000                  # time to first token (max mode)
    per_token_ms:    20                  # per output token (all modes)

# ============================================================
# PRICING (at release, per million tokens)
# ============================================================
pricing:
  input_per_million:         5.00
  output_per_million:       25.00
  cache_write_per_million:   6.25
  cache_read_per_million:    0.50
  batch_discount:            0.50       # 50% off for async batch API
  # Thinking tokens billed at output rate

# ============================================================
# TOKENIZER
# ============================================================
tokenizer:
  vocab_size: 131072
  model_type: bpe
  byte_fallback: true
  character_coverage: 0.9995
  special_tokens:
    bos: "<|begin_of_text|>"
    eos: "<|end_of_text|>"
    pad: "<|pad|>"
    unk: "<unk>"
    thinking_start: "<thinking>"
    thinking_end:   "</thinking>"
    tool_call_start: "<tool_call>"
    tool_call_end:   "</tool_call>"
    image:           "<|image|>"
    fim_prefix:      "<|fim_prefix|>"
    fim_middle:      "<|fim_middle|>"
    fim_suffix:      "<|fim_suffix|>"

# ============================================================
# CHECKPOINTING
# ============================================================
checkpointing:
  save_every_steps: 5000
  keep_last_n: 3
  async_save: true                  # non-blocking save to NFS
  checkpoint_dir: "checkpoints/"

  # Release artifact
  release_dir: "claude-opus-4-6/"
  shard_size_gb: 20.0
  num_shards: 200

# ============================================================
# LOGGING
# ============================================================
logging:
  log_every_steps: 10
  eval_every_steps: 1000
  wandb:
    project: "claude-opus-4-6-pretraining"
    entity:  "anthropic-research"
    tags:    ["moe", "2t-params", "bf16", "fsdp"]
